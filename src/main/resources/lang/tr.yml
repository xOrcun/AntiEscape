# Commands Help
commands-help:
  - "&8&m----------&r &8[ &eAntiEscape Komutları &8] &8&m----------&r"
  - "&e/control help &7- Bu yardım mesajını göster"
  - "&e/control version &7- Plugin versiyonu ve bilgilerini göster"
  - "&e/control reload &7- Plugin yapılandırmasını yeniden yükle"
  - "&e/control chat <join/leave> &7- Kontrol sohbetine katıl veya ayrıl"
  - "&e/control take <player> &7- Bir oyuncuyu kontrol altına al"
  - "&e/control end <player> [ban] &7- Bir oyuncuyu kontrolden serbest bırak veya yasakla"
  - "&e/control set <area/return> &7- Kontrol alanı veya dönüş konumunu ayarla"
  - "&e/control delete <area/spawn> &7- Kontrol alanı veya dönüş konumunu sil"
  - "&e/control discord test &7- Discord webhook'unu test et"
  - "&e/control logs <list/clear/clear-all> &7- Log dosyalarını yönet"
  - "&e/control history <player> &7- Kontrol geçmişini göster"
  - "&e/control notes <player> [add/clear/list] [note] &7- Oyuncu notlarını yönet"
  - "&e/control stats <player> &7- Oyuncu istatistiklerini göster"
  - "&e/control whitelist <player> [add/remove] [reason] &7- Whitelist'i yönet"
  - "&e/control suspicious <player> [clear] &7- Şüpheli aktiviteyi yönet"
  - "&e/control violations <player> [clear] &7- İhlal sayısını yönet"
  - "&e/control ip <ip> &7- IP adresindeki oyuncuları göster"

