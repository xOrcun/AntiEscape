# AntiEscape Plugin Language File
# Language: English

# General Messages
no-permission: "&cYou don't have permission to use this command!"
invalid-argument: "&cInvalid argument! Use /control help for help."

# No Prefix Messages (for status displays)
no-prefix:
  yes: "Yes"
  no: "No"
  unknown: "Unknown"
  whitelisted: "Whitelisted"
  not-whitelisted: "Not Whitelisted"
  controlled: "Controlled"
  not-controlled: "Not Controlled"
  banned: "Banned"
  released: "Released"
  no-history: "No control history found"
  no-notes: "No notes found"

# Advanced Control Messages
advanced-control-note-added: "&aNote added successfully!"
advanced-control-notes-cleared: "&aNotes cleared successfully!"
advanced-control-history-record: "&7%index%. &f%controller% &7→ &f%target% &7(%start_date% - %end_date%) &f%status%"
advanced-control-player-not-found: "&cPlayer not found: %player%"
advanced-control-usage-history: "&cUsage: /control history <player>"
advanced-control-usage-notes: "&cUsage: /control notes <add/clear/list> <player> [note]"
advanced-control-usage-stats: "&cUsage: /control stats <player>"
advanced-control-usage-notes-add: "&cUsage: /control notes add <player> <note>"

# Security Messages
whitelist-added: "&aPlayer added to whitelist: %player%"
whitelist-removed: "&aPlayer removed from whitelist: %player%"
suspicious-cleared: "&aSuspicious activity cleared for: %player%"
violations-cleared: "&aViolation count cleared for &f%player%"
ip-no-players: "&7No players found on this IP."

# Security Usage Messages
whitelist-usage-add: "&cUsage: /control whitelist add <player> [reason]"
whitelist-usage-remove: "&cUsage: /control whitelist remove <player>"
suspicious-usage: "&cUsage: /control suspicious <player> [clear]"
violations-usage: "&cUsage: /control violations <player> [clear]"
ip-usage: "&cUsage: /control ip <ip>"

# Security Status Lists
whitelist-status-list:
  - "&8&m----------&r &8[ &eWhitelist Status &8] &8&m----------&r"
  - "&7Player: &f%player%"
  - "&7Whitelisted: &f%status%"
  - "&7Added by: &f%admin%"

suspicious-status-list:
  - "&8&m----------&r &8[ &eSuspicious Activity &8] &8&m----------&r"
  - "&7Player: &f%player%"
  - "&7Count: &f%count%"

violations-status-list:
  - "&8&m----------&r &8[ &eViolation Count &8] &8&m----------&r"
  - "&7Player: &f%player%"
  - "&7Violations: &f%count%"
  - "&7Last Ban Duration: &f%last_ban%"

ip-info-list:
  - "&8&m----------&r &8[ &eIP Info &8] &8&m----------&r"
  - "&7IP Address: &f%ip%"
  - "&7Players: &f%count%"

# Log Messages
log-files-enabled: "&7%type%: &aEnabled"
log-files-disabled: "&7%type%: &cDisabled"
log-files-cleared: "&aLog file '%type%' cleared successfully!"
log-files-all-cleared: "&aAll log files cleared successfully!"
log-files-usage: "&cUsage: /control logs clear <type>"
log-files-types: "&7Types: moves, commands, chat, damage, items, control, general"

# Discord Messages
discord-disabled: "&cDiscord webhook is disabled in webhook.yml"
discord-url-not-set: "&cPlease set your Discord webhook URL in webhook.yml"
discord-sending: "&aSending Discord webhook test message..."
discord-sent: "&aDiscord webhook test message sent!"

# Control Messages
control-started: "&a%player% is now under control!"
control-finished-clean: "&a%player% has been released from control!"
control-finished-ban: "&c%player% has been banned for cheating!"
control-message: "&cYou are now under control by %player%!"
control-chat: "&eYou can use /control chat join to join the control chat!"
control-chat-join: "&aYou have joined the control chat!"
control-chat-left: "&cYou have left the control chat!"
already-in-control-chat: "&cYou are already in the control chat!"
not-in-control-chat: "&cYou are not in the control chat!"
player-joined-control-chat: "&a%player% has joined the control chat!"
player-quit-control-chat: "&c%player% has left the control chat!"
control-chat-player-quit: "&c%player% has left the server while under control!"

# Error Messages
error-move: "&cYou cannot move while under control!"
error-drop: "&cYou cannot drop items while under control!"
error-damage-victim: "&cYou cannot damage %victim% while they are under control!"
error-damage-attacker-you: "&c%attacker% tried to damage you but you are under control!"
