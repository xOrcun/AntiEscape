# Player Messages
no-player: "&cPlease specify a player name!"
offline-player: "&cPlayer is not online!"
control-player-started: "&c%player% is already under control!"
control-player-error: "&c%player% is not under control!"
cannot-control-yourself: "&cYou cannot control yourself!"

# Location Messages
control-area-not-set: "&cControl area is not set! Use /control set area"
control-return-not-set: "&cControl return location is not set! Use /control set return"
control-area-already-set: "&cControl area is already set! Use /control delete area to remove it"
control-return-already-set: "&cControl return location is already set! Use /control delete spawn to remove it"
control-area-set: "&aControl area has been set!"
control-return-set: "&aControl return location has been set!"
control-area-deleted: "&cControl area has been deleted!"
control-return-deleted: "&cControl return location has been deleted!"
error-set-arg: "&cPlease specify what you want to set! (area/return)"
error-delete-arg: "&cPlease specify what you want to delete! (area/spawn)"

# Config Messages
config-reloaded: "&aConfiguration has been reloaded!"

# Commands Help
commands-help:
  - "&8&m----------&r &8[ &eAntiEscape Commands &8] &8&m----------&r"
  - "&e/control help &7- Show this help message"
  - "&e/control version &7- Show plugin version and information"
  - "&e/control reload &7- Reload plugin configuration"
  - "&e/control chat <join/leave> &7- Join or leave control chat"
  - "&e/control take <player> &7- Put a player under control"
  - "&e/control end <player> [ban] &7- Release or ban a player from control"
  - "&e/control set <area/return> &7- Set control area or return location"
  - "&e/control delete <area/spawn> &7- Delete control area or return location"
  - "&e/control discord test &7- Test Discord webhook"
  - "&e/control logs <list/clear/clear-all> &7- Manage log files"
  - "&e/control history <player> &7- Show control history"
  - "&e/control notes <player> [add/clear/list] [note] &7- Manage player notes"
  - "&e/control stats <player> &7- Show player statistics"
  - "&e/control whitelist <player> [add/remove] [reason] &7- Manage whitelist"
  - "&e/control suspicious <player> [clear] &7- Manage suspicious activity"
  - "&e/control violations <player> [clear] &7- Manage violation count"
  - "&e/control ip <ip> &7- Show players on IP address"

